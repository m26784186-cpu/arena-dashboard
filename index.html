<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Platform</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Tahoma, Geneva, sans-serif; }
        body { background-color: #080710; color: #ffffff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; padding-bottom: 90px; }
        .header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding: 10px 5px; }
        .profile-section { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 45px; height: 45px; background: linear-gradient(135deg, #6a11cb, #2575fc); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 0 15px rgba(37, 117, 252, 0.5); }
        .title-app { font-size: 18px; font-weight: bold; color: #e0aaff; text-shadow: 0 0 10px rgba(224, 170, 255, 0.4); }
        .balance-card { width: 100%; max-width: 400px; background: rgba(20, 18, 33, 0.7); border: 1px solid #3c2a6b; border-radius: 24px; padding: 25px 20px; text-align: center; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(138, 43, 226, 0.2); margin-bottom: 25px; backdrop-filter: blur(10px); }
        .balance-title { font-size: 13px; color: #9d4edd; margin-bottom: 10px; font-weight: bold; }
        .balance-amount { font-size: 40px; font-weight: 800; color: #ffffff; margin-bottom: 20px; text-shadow: 0 0 20px rgba(255, 255, 255, 0.3); }
        .btn-add-coin { background: linear-gradient(90deg, #c57bfa, #7b2cbf); color: white; border: none; padding: 14px; border-radius: 14px; font-size: 15px; font-weight: bold; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 20px rgba(123, 44, 191, 0.4); width: 100%; }
        .btn-add-coin:active { transform: scale(0.97); }
        .section-title { width: 100%; max-width: 400px; font-size: 14px; color: #9d4edd; margin-bottom: 15px; padding-right: 5px; font-weight: bold; }
        .grid-options { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 14px; }
        .option-item { background: #121026; border: 1px solid #231b42; border-radius: 18px; padding: 18px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .option-item:active { background: #1a1736; border-color: #5a39a8; box-shadow: 0 0 15px rgba(138, 43, 226, 0.3); }
        .option-left { display: flex; align-items: center; gap: 15px; }
        .option-icon { width: 44px; height: 44px; background: rgba(157, 78, 221, 0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; color: #e0aaff; border: 1px solid rgba(157, 78, 221, 0.25); }
        .option-details h4 { font-size: 15px; color: #ffffff; margin-bottom: 4px; }
        .option-details p { font-size: 11px; color: #706e8a; }
        .arrow-icon { color: #5a5775; font-size: 14px; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(8, 7, 16, 0.9); backdrop-filter: blur(12px); border-top: 1px solid #1f1938; display: flex; justify-content: space-around; padding: 12px 0; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 6px; color: #524f70; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: #c57bfa; text-shadow: 0 0 10px rgba(197, 123, 250, 0.5); }
        .nav-icon { font-size: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="profile-section">
            <div class="avatar">A</div>
            <span class="title-app">پلتفرم هوشمند آرنا</span>
        </div>
        <div style="color: #6a11cb; font-weight: bold; font-size: 13px;">VIP</div>
    </div>
    <div class="balance-card">
        <div class="balance-title">CORE BALANCE</div>
        <div class="balance-amount" id="coin-balance">50,000</div>
        <button class="btn-add-coin" onclick="addCoins()">افزودن موجودی +</button>
    </div>
    <div class="section-title">سرویس‌های فعال پایگاه داده</div>
    <div class="grid-options">
        <div class="option-item" onclick="triggerAction('chat')">
            <div class="option-left">
                <div class="option-icon">💬</div>
                <div class="option-details">
                    <h4>چت متنی هوش مصنوعی</h4>
                    <p>اتصال هوشمند به هسته پردازش متنی</p>
                </div>
            </div>
            <div class="arrow-icon">◀</div>
        </div>
        <div class="option-item" onclick="triggerAction('image')">
            <div class="option-left">
                <div class="option-icon">🎨</div>
                <div class="option-details">
                    <h4>استودیو تصویرسازی هوشمند</h4>
                    <p>رندر فوری تصاویر با مدل پیشرفته گرافیکی</p>
                </div>
            </div>
            <div class="arrow-icon">◀</div>
        </div>
    </div>
    <div class="bottom-nav">
        <div class="nav-item active">
            <div class="nav-icon">🏠</div>
            <div>خانه</div>
        </div>
        <div class="nav-item" onclick="triggerAction('models')">
            <div class="nav-icon">⚡</div>
            <div>مدل‌ها</div>
        </div>
        <div class="nav-item" onclick="triggerAction('gallery')">
            <div class="nav-icon">🖼️</div>
            <div>گالری</div>
        </div>
        <div class="nav-item" onclick="triggerAction('wallet')">
            <div class="nav-icon">💳</div>
            <div>حساب</div>
        </div>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let balance = 50000;
        function addCoins() {
            balance += 5000;
            document.getElementById('coin-balance').innerText = balance.toLocaleString();
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }
        function triggerAction(sectionName) {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            alert('بخش ' + sectionName + ' در حال یکپارچه‌سازی نهایی است.');
        }
    </script>
</body>
</html>
